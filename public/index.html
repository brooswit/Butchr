<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>butchr</title>
    <!--
      `./`, not `/`. This file is a bun BUILD ENTRY: bun resolves these two refs on disk, bundles
      them, and rewrites both to the content-hashed emitted names. An absolute `/style.css` is not
      a path bun will resolve from here.

      The paths it REWRITES them to are absolute, because `build:fe` passes `--public-path=/`.
      That matters: serveStatic gives every extensionless route-like path the SPA fallback, so a
      typed `/task/<id>` is answered with this document — and a relative `./index-<hash>.js` would
      then resolve to `/task/index-<hash>.js`, which 404s (a missing path WITH an extension does
      not fall back). Absolute emitted refs load from any depth, exactly as `/app.js` used to.
      `<base href="/">` would also fix it, and must NOT be used: it reroutes the sprite's
      `<use href="#lp-icon-…">` fragment refs to another document and blanks every icon.
    -->
    <link rel="stylesheet" href="./style.css" />
    <script>
      // Set the theme before first paint so there's no flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("butchr-theme");
          document.documentElement.dataset.theme = t === "dark" ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <a href="#/" class="brand">butchr<span class="dot">·</span></a>
      <nav class="topnav">
        <a href="#/projects" class="topnav-link">Projects</a>
        <a href="#/metrics" class="topnav-link">Metrics</a>
      </nav>
      <div class="topbar-right">
        <a
          href="#/"
          id="attention"
          class="attention"
          hidden
          title="Tasks need your attention"
        ></a>
        <button
          type="button"
          id="pause-toggle"
          class="pause-toggle"
          title="Pause new task dispatch (maintenance mode)"
          aria-label="Pause new task dispatch"
        >⏸ Pause</button>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          title="Toggle light / dark theme"
          aria-label="Toggle light / dark theme"
        >☾</button>
        <div class="conn" id="conn" title="live connection">
          <span class="led"></span><span class="conn-label">connecting…</span>
        </div>
      </div>
    </header>
    <div id="pause-banner" class="pause-banner" hidden role="status" aria-live="polite">
      <span class="pb-dot" aria-hidden="true"></span>
      <span class="pb-text">
        <b>PAUSED</b> — new task dispatch is halted (maintenance mode). Running,
        review, and idle tasks continue; queued tasks wait until you resume.
      </span>
      <button type="button" id="pause-banner-resume" class="btn">Resume dispatch</button>
    </div>
    <main id="app"><div class="loading">loading…</div></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
