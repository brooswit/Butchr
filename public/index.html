<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>butchr</title>
    <link rel="stylesheet" href="/style.css" />
    <script>
      // Set the theme before first paint so there's no flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("butchr-theme");
          document.documentElement.dataset.theme = t === "dark" ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <a href="#/" class="brand">butchr<span class="dot">·</span></a>
      <nav class="topnav">
        <a href="#/" class="topnav-link">Workspaces</a>
        <a href="#/projects" class="topnav-link">Projects</a>
        <a href="#/metrics" class="topnav-link">Metrics</a>
      </nav>
      <div class="topbar-right">
        <a
          href="#/"
          id="attention"
          class="attention"
          hidden
          title="Tasks need your attention"
        ></a>
        <button
          type="button"
          id="pause-toggle"
          class="pause-toggle"
          title="Pause new task dispatch (maintenance mode)"
          aria-label="Pause new task dispatch"
        >⏸ Pause</button>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          title="Toggle light / dark theme"
          aria-label="Toggle light / dark theme"
        >☾</button>
        <div class="conn" id="conn" title="live connection">
          <span class="led"></span><span class="conn-label">connecting…</span>
        </div>
      </div>
    </header>
    <div id="pause-banner" class="pause-banner" hidden role="status" aria-live="polite">
      <span class="pb-dot" aria-hidden="true"></span>
      <span class="pb-text">
        <b>PAUSED</b> — new task dispatch is halted (maintenance mode). Running,
        review, and idle tasks continue; queued tasks wait until you resume.
      </span>
      <button type="button" id="pause-banner-resume" class="btn">Resume dispatch</button>
    </div>
    <main id="app"><div class="loading">loading…</div></main>
    <script src="/app.js"></script>
  </body>
</html>
