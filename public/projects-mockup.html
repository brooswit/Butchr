<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>butchr — Projects (mockup)</title>
    <!--
      DESIGN-FIRST MOCKUP (story st-04869886, subtask S0) — a self-contained, CLICKABLE
      static preview of the whole new "Projects" dashboard section for the REVAMP-4
      project/CEO tier. Everything here is INLINE and uses FAKE in-memory data only:
      there are NO real API calls. This exists for CTO->CEO visual sign-off BEFORE the
      real UI is wired; a later subtask deletes this file once the real UI lands.

      The look is deliberately copied VERBATIM from public/style.css so it can't drift:
      the same theme tokens, the shared .chip status palette, the .modal/.field/.btn
      pattern, the rollup bars, the .kind-badge outlined pills, focus-visible a11y and
      prefers-reduced-motion. The FAKE data is shaped to the REAL endpoints so the field
      names are accurate (but they are never fetched):
        GET  /api/projects                      -> list
        GET/PATCH /api/projects/:id             -> { ceo_enabled }
        GET/POST  /api/projects/:id/repos       -> register
        DELETE    /api/projects/:id/repos/:repoId
        POST /api/projects/:id/initiatives      -> { repo, brief } OR { targets:[{repo,brief}] }
        GET  /api/projects/:id/initiatives[/:iid]
      A project node has: id, brief, ceo_enabled (null|0|1), workspace_id (anchor dir), status.
    -->
    <script>
      // Set the theme before first paint so there's no flash of the wrong theme —
      // identical to the real dashboard (public/index.html). Falls back to the OS
      // preference (prefers-color-scheme) when nothing is stored.
      (function () {
        try {
          var t = localStorage.getItem("butchr-theme");
          if (t !== "dark" && t !== "light") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <style>
      /* ============================================================
         TOKENS — copied verbatim from public/style.css :root / [data-theme]
         ============================================================ */
      :root {
        --bg: #ffffff;
        --panel: #f7f9fb;
        --panel-2: #eceff2;
        --border: #d8dde3;
        --text: #23252a;
        --muted: #545a62;
        --accent: #425eff;
        --accent-2: #3144d9;

        --idea: #9333ea;
        --spec_review: #a35901;
        --blocked: #7c3aed;
        --needs_info: #be185d;
        --inactive: #5b6470;
        --in_progress: #425eff;
        --idle: #0e7490;
        --needs_user_input: #dc2626;
        --in_review: #a35901;
        --merged: #006933;
        --rolling_back: #9a3412;
        --rolled_back: #7c5e3b;
        --failed: #8a1322;
        --aborted: #545a62;
        --rejected: #b6073c;

        --kind-node: var(--accent);
        --kind-leaf: var(--muted);
        --kind-cto: #b45309;
        --kind-leader: var(--blocked);
        --kind-unknown: var(--muted);

        --lc-working: var(--merged);
        --lc-parked:  var(--muted);
        --lc-stalled: #b45309;

        --mono: SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace;
        --font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, Helvetica, Arial, sans-serif;

        --radius-sm: 3px;
        --radius-md: 6px;
        --radius-lg: 16px;
      }
      html[data-theme="dark"] {
        --bg: #181a1f;
        --panel: #23252a;
        --panel-2: #2d3239;
        --border: #3f454c;
        --text: #f7f9fb;
        --muted: #898e94;
        --accent: #425eff;
        --accent-2: #7084ff;

        --spec_review: #c47a0a;
        --blocked: #9466f0;
        --needs_info: #db2777;
        --inactive: #6b7480;
        --in_progress: #425eff;
        --idle: #22a7c2;
        --needs_user_input: #ef4444;
        --in_review: #c47a0a;
        --merged: #006933;
        --rolling_back: #c2410c;
        --rolled_back: #a3814f;
        --failed: #c0263a;
        --aborted: #545a62;
        --rejected: #b6073c;

        --kind-cto: #d97706;
        --lc-stalled: #d97706;
      }

      /* ============================================================
         BASE — matches public/style.css base + layout
         ============================================================ */
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg); color: var(--text);
        font-family: var(--font); font-size: 14px; line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent-2); text-decoration: none; }
      a:hover { text-decoration: underline; }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
      h2 { font-size: 16px; font-weight: 600; margin: 28px 0 12px; }
      main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
      .muted { color: var(--muted); }
      small.muted { font-size: 12px; }

      /* topbar (a light echo of the real dashboard chrome) */
      .topbar {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
      }
      .brand { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
      .brand .dot { color: var(--accent); }
      .topbar .spacer { margin-left: auto; }
      .mock-tag {
        font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        color: var(--spec_review); border: 1px solid var(--spec_review);
        border-radius: var(--radius-sm); padding: 1px 7px;
      }
      .theme-toggle {
        display: inline-flex; align-items: center; gap: 6px;
        background: transparent; color: var(--muted);
        border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 6px 10px; font-size: 13px; font-weight: 600; cursor: pointer;
      }
      .theme-toggle:hover { background: var(--panel-2); color: var(--text); }

      /* ============================================================
         BUTTONS / FORMS — verbatim from public/style.css
         ============================================================ */
      .btn {
        background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md);
        padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
      }
      .btn:hover { background: var(--accent-2); }
      .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
      .btn.ghost:hover { background: var(--panel-2); }
      .btn.danger { background: var(--rejected); }
      .btn.success { background: var(--merged); }
      .btn.ghost.danger-outline { border-color: var(--rejected); color: var(--rejected); }
      .btn.ghost.danger-outline:hover { background: var(--rejected); color: #fff; }
      .btn.xs { padding: 2px 10px; font-size: 12px; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      input[type="text"], textarea, select {
        width: 100%; background: var(--bg); color: var(--text);
        border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px 11px;
        font-size: 13px; font-family: inherit;
      }
      textarea { resize: vertical; min-height: 90px; font-family: var(--mono); font-size: 13px; }
      label.field { display: block; margin-bottom: 12px; }
      label.field .lbl { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
      label.field .hint { display: block; font-size: 12px; color: var(--muted); margin-top: 5px; }
      .row { display: flex; gap: 10px; align-items: center; }

      /* Visible focus everywhere (a11y) — mirrors the swimlanes focus-visible rule */
      a:focus-visible, button:focus-visible, select:focus-visible,
      textarea:focus-visible, input:focus-visible, .card.clickable:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px;
      }

      /* ============================================================
         CARDS + GRID — verbatim
         ============================================================ */
      .grid { display: grid; gap: 14px; }
      .grid.dirs { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
      .card {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 16px;
      }
      .card .title { font-weight: 600; font-size: 15px; }
      .card .path { color: var(--muted); font-family: var(--mono); font-size: 12px; word-break: break-all; margin-top: 2px; }
      .card.clickable { cursor: pointer; transition: border-color .12s, box-shadow .12s; }
      .card.clickable:hover { border-color: var(--accent); }
      .empty { color: var(--muted); padding: 28px; text-align: center; border: 1px dashed var(--border); border-radius: 8px; }
      .panel {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 16px; margin-top: 14px;
      }

      /* ============================================================
         STATUS CHIPS — the SHARED .chip palette, verbatim
         ============================================================ */
      .chip {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
        padding: 2px 8px; border-radius: var(--radius-md); color: #fff;
      }
      .chip.idea { background: var(--idea); }
      .chip.spec_review { background: var(--spec_review); }
      .chip.blocked { background: var(--blocked); }
      .chip.needs_info { background: var(--needs_info); }
      .chip.inactive { background: var(--inactive); }
      .chip.in_progress { background: var(--in_progress); }
      .chip.idle { background: var(--idle); }
      .chip.needs_user_input { background: var(--needs_user_input); animation: pause-pulse 1.6s ease-in-out infinite; }
      .chip.in_review { background: var(--in_review); }
      .chip.merged { background: var(--merged); }
      .chip.rolling_back { background: var(--rolling_back); }
      .chip.rolled_back { background: var(--rolled_back); }
      .chip.failed { background: var(--failed); }
      .chip.aborted { background: var(--aborted); }
      /* STORY (node) status chips reuse the same palette */
      .chip.open { background: var(--idea); }
      .chip.merging { background: var(--in_progress); }
      .chip.merge_blocked { background: var(--blocked); }
      .chip.done { background: var(--merged); }
      /* live/enabled/disabled variants for the CEO pill map onto shared status vars —
         no invented colors: merged=live (green), in_progress=enabled (blue), inactive=disabled. */
      .chip.live { background: var(--merged); }
      .chip.enabled { background: var(--in_progress); }
      .chip.disabled { background: var(--inactive); }

      /* A subtle OUTLINED variant for the project's own node status — cosmetic only, so it
         never sets an expectation the real UI can't honor (real createProject inserts 'merged').
         The CEO pill above is the real live/enabled/disabled signal. */
      .chip.subtle {
        background: transparent; border: 1px solid var(--border);
        color: var(--muted); text-transform: none; letter-spacing: 0; font-weight: 500; font-size: 10px;
      }

      @keyframes pause-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      @media (prefers-reduced-motion: reduce) {
        .chip.needs_user_input, .ceo-dot.alive { animation: none; }
      }

      /* KIND badge — outlined pill, verbatim; used here for repo chips (forward-compat repo kind) */
      .kind-badge {
        display: inline-flex; align-items: center; gap: 3px;
        font-family: var(--font); font-size: 10px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.4;
        color: var(--muted); background: transparent;
        border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 0 5px; vertical-align: middle; white-space: nowrap;
      }
      .kind-badge.kind-repo { color: var(--kind-cto); border-color: var(--kind-cto); }

      /* ============================================================
         PROGRESS ROLLUP — verbatim (.rollup-bar / .swim-track)
         ============================================================ */
      .rollup-summary { display: flex; align-items: baseline; gap: 8px; font-size: 13px; }
      .rollup-frac { font-weight: 600; }
      .rollup-bar {
        height: 8px; margin: 8px 0 4px;
        background: var(--border); border-radius: 999px; overflow: hidden;
      }
      .rollup-bar-fill { height: 100%; background: var(--merged); border-radius: 999px; transition: width 0.3s ease; }
      /* card mini-bar (from the swimlanes .swim-track) */
      .swim-prog { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
      .swim-track { width: 96px; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; display: inline-block; }
      .swim-track i { display: block; height: 100%; background: var(--merged); }

      /* ============================================================
         PROJECTS-SPECIFIC LAYOUT (small additive layer, tokens only)
         ============================================================ */
      .page-head { display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
      .page-head .ph-text { flex: 1; min-width: 240px; }
      .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
      .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 0; margin-bottom: 6px; }
      .back-link:hover { color: var(--text); }

      /* project card internals */
      .pc-head { display: flex; align-items: flex-start; gap: 8px; }
      .pc-head .title { flex: 1; }
      .pc-repos { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
      .pc-foot { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
      .pc-foot .spacer { margin-left: auto; }

      /* panel headers with an action on the right */
      .panel-head { display: flex; align-items: center; gap: 10px; margin: 0 0 12px; }
      .panel-head h2 { margin: 0; }
      .panel-head .spacer { margin-left: auto; }

      /* CEO card */
      .panel.ceo-card { border-left: 3px solid var(--kind-node); }
      .ceo-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .ceo-life { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); }
      .ceo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
      .ceo-dot.alive { background: var(--merged); box-shadow: 0 0 5px var(--merged); animation: pause-pulse 2.4s ease-in-out infinite; }
      .ceo-dot.down { background: var(--muted); }
      .ceo-note {
        margin-top: 12px; font-size: 12.5px; color: var(--muted);
        background: var(--panel-2); border: 1px solid var(--border);
        border-left: 3px solid var(--spec_review); border-radius: var(--radius-md); padding: 9px 11px;
      }
      .ceo-note code { font-family: var(--mono); color: var(--text); }

      /* toggle switch (built from tokens) */
      .switch { position: relative; display: inline-flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; font-size: 13px; }
      .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
      .switch .track {
        width: 40px; height: 22px; border-radius: 999px; background: var(--panel-2);
        border: 1px solid var(--border); position: relative; transition: background .15s, border-color .15s; flex: none;
      }
      .switch .track::after {
        content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
        border-radius: 50%; background: var(--muted); transition: transform .15s, background .15s;
      }
      .switch input:checked + .track { background: color-mix(in srgb, var(--in_progress) 30%, transparent); border-color: var(--in_progress); }
      .switch input:checked + .track::after { transform: translateX(18px); background: var(--in_progress); }
      .switch input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) { .switch .track, .switch .track::after { transition: none; } }

      /* repos list rows */
      .repo-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--border); }
      .repo-row:first-child { border-top: none; }
      .repo-row .ic { color: var(--kind-cto); }
      .repo-row .nm { font-weight: 600; }
      .repo-row .rp { font-family: var(--mono); font-size: 12px; color: var(--muted); }
      .repo-row .spacer { margin-left: auto; }
      .icon-btn {
        background: none; border: 1px solid transparent; color: var(--muted);
        cursor: pointer; border-radius: var(--radius-md); width: 26px; height: 26px;
        display: inline-flex; align-items: center; justify-content: center; font-size: 15px; line-height: 1;
      }
      .icon-btn:hover { color: var(--rejected); border-color: var(--rejected); }

      /* initiatives */
      .init { border-top: 1px solid var(--border); padding: 14px 0; }
      .init:first-of-type { border-top: none; }
      .init .ib { font-weight: 600; font-size: 14px; }
      .init-targets { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px; }
      .init-target { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
      .init-target .tr { font-family: var(--mono); color: var(--muted); }

      /* ============================================================
         MODAL — verbatim from public/style.css
         ============================================================ */
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center; z-index: 200;
      }
      .modal {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg);
        width: min(640px, 92vw); max-height: 80vh; display: flex; flex-direction: column;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      .modal .m-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
      .modal .m-head h3 { margin: 0; font-size: 15px; flex: 1; }
      .modal .m-body { overflow: auto; padding: 16px; }
      .modal .m-foot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
      .modal .m-foot .hint { flex: 1; font-size: 12px; color: var(--muted); }
      .m-error { flex: 1; font-size: 12px; color: var(--muted); }
      .m-error.on { color: var(--rejected); }
      .x-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
      .x-close:hover { color: var(--text); }

      /* launch-initiative mode toggle (segmented control from tokens) */
      .seg { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 14px; }
      .seg button {
        background: transparent; color: var(--muted); border: none; cursor: pointer;
        padding: 7px 14px; font-size: 12.5px; font-weight: 600;
      }
      .seg button.on { background: var(--panel-2); color: var(--text); }
      .seg button + button { border-left: 1px solid var(--border); }
      .target-row { display: grid; grid-template-columns: minmax(0, 200px) 1fr auto; gap: 10px; align-items: start; margin-bottom: 12px; }
      .target-row textarea { min-height: 60px; }
      .target-row .icon-btn { margin-top: 6px; }
      .add-target { margin-top: 2px; }

      /* toast */
      .toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: var(--radius-md);
        font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.35); z-index: 300;
        opacity: 0; transition: opacity .2s; pointer-events: none;
      }
      .toast.on { opacity: 1; }
      @media (prefers-reduced-motion: reduce) { .toast { transition: none; } }
    </style>
  </head>
  <body>
    <div class="topbar">
      <span class="brand">butchr<span class="dot">.</span></span>
      <span class="mock-tag">Projects · mockup</span>
      <span class="spacer"></span>
      <button class="theme-toggle" id="gateToggle" title="Simulate the global BUTCHR_CEO_AGENT gate (mockup control)">
        <span id="gateLabel">Gate: on</span>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme">
        <span id="themeIcon">☾</span><span id="themeLabel">Dark</span>
      </button>
    </div>
    <main id="app" aria-live="polite"></main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      "use strict";
      // ------------------------------------------------------------------
      // tiny DOM + escape helpers (mirroring app.js conventions)
      // ------------------------------------------------------------------
      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
      function $(sel, root) { return (root || document).querySelector(sel); }

      // ------------------------------------------------------------------
      // FAKE, in-memory data — shaped to the real /api/projects endpoints.
      // Nothing here is fetched; mutations mutate this array + re-render, exactly
      // like the real UI's optimistic path would after a successful call.
      // ------------------------------------------------------------------
      // Global gate mirroring the BUTCHR_CEO_AGENT env flag. When OFF, project CEO
      // toggles are inert and the CEO card shows an honest note. Toggleable in-mock so
      // reviewers can see BOTH states.
      let CEO_GATE_ON = true;

      // Known directories the "Add repo" / anchor-workspace pickers choose from.
      const KNOWN_DIRS = [
        "/home/dev/acme/web",
        "/home/dev/acme/api",
        "/home/dev/acme/mobile",
        "/home/dev/acme/infra",
        "/home/dev/acme/design-system",
        "/home/dev/acme/docs",
      ];

      let nextId = 100;
      function mkId(prefix) { return prefix + "-" + (++nextId).toString(16) + "e4"; }

      let projects = [
        {
          id: "pr-8f21ac", brief: "Acme unified checkout — ship a single cross-repo checkout flow across web, api, and mobile.",
          ceo_enabled: 1, workspace_id: "/home/dev/acme/web", status: "merged",
          leaderAlive: true, leaderAgo: "2m ago",
          repos: [
            { repoId: "rp-01", name: "web", dir: "/home/dev/acme/web" },
            { repoId: "rp-02", name: "api", dir: "/home/dev/acme/api" },
            { repoId: "rp-03", name: "mobile", dir: "/home/dev/acme/mobile" },
          ],
          initiatives: [
            { iid: "in-01", brief: "One-tap checkout token exchange", targets: [
              { repo: "web", story: { id: "st-a1", status: "merged" } },
              { repo: "api", story: { id: "st-a2", status: "merged" } },
              { repo: "mobile", story: { id: "st-a3", status: "in_progress" } },
            ] },
            { iid: "in-02", brief: "Shared address-book component + endpoint", targets: [
              { repo: "web", story: { id: "st-b1", status: "in_review" } },
              { repo: "api", story: { id: "st-b2", status: "merged" } },
            ] },
            { iid: "in-03", brief: "Idempotent payment retries", targets: [
              { repo: "api", story: { id: "st-c1", status: "merged" } },
            ] },
          ],
        },
        {
          id: "pr-3d90bb", brief: "Design-system 2.0 rollout — migrate every surface onto the new token set.",
          ceo_enabled: 0, workspace_id: "/home/dev/acme/design-system", status: "merged",
          leaderAlive: false, leaderAgo: "disabled",
          repos: [
            { repoId: "rp-10", name: "design-system", dir: "/home/dev/acme/design-system" },
            { repoId: "rp-11", name: "web", dir: "/home/dev/acme/web" },
          ],
          initiatives: [
            { iid: "in-10", brief: "Ship v2 color tokens", targets: [
              { repo: "design-system", story: { id: "st-d1", status: "merged" } },
              { repo: "web", story: { id: "st-d2", status: "blocked" } },
            ] },
          ],
        },
        {
          id: "pr-71ee02", brief: "Observability baseline — structured logs + traces across the fleet.",
          ceo_enabled: null, workspace_id: "/home/dev/acme/infra", status: "merged",
          leaderAlive: false, leaderAgo: "never started",
          repos: [
            { repoId: "rp-20", name: "infra", dir: "/home/dev/acme/infra" },
          ],
          initiatives: [],
        },
      ];

      // Toggle to preview the honest empty-state (Screen 1). Flip via the header button.
      let showEmpty = false;

      // ------------------------------------------------------------------
      // routing (module-scope view var + render(), swapping main — same
      // "swap the body region on state change" convention app.js uses)
      // ------------------------------------------------------------------
      let view = { name: "overview", projectId: null };

      function goOverview() { view = { name: "overview", projectId: null }; render(); }
      function goDetail(id) { view = { name: "detail", projectId: id }; try { window.scrollTo(0, 0); } catch (e) { /* ignore */ } render(); }
      function projectById(id) { return projects.find(function (p) { return p.id === id; }); }

      // rollups
      function storyDone(s) { return s.status === "merged" || s.status === "done"; }
      function initiativeDone(init) {
        return init.targets.length > 0 && init.targets.every(function (t) { return storyDone(t.story); });
      }
      function initiativeRollup(p) {
        const total = p.initiatives.length;
        const done = p.initiatives.filter(initiativeDone).length;
        return { done: done, total: total, pct: total ? Math.round((done / total) * 100) : 0 };
      }
      function storyRollup(init) {
        const total = init.targets.length;
        const done = init.targets.filter(function (t) { return storyDone(t.story); }).length;
        return { done: done, total: total, pct: total ? Math.round((done / total) * 100) : 0 };
      }

      // CEO status derivation -> { cls, label } for the pill. Reuses shared palette.
      function ceoPill(p) {
        if (!CEO_GATE_ON) return { cls: "disabled", label: "CEO off (gate)" };
        if (p.ceo_enabled === 1) return p.leaderAlive
          ? { cls: "live", label: "CEO live" }
          : { cls: "enabled", label: "CEO enabled" };
        return { cls: "disabled", label: "CEO disabled" };
      }

      function toast(msg) {
        const t = $("#toast");
        t.textContent = msg; t.classList.add("on");
        window.setTimeout(function () { t.classList.remove("on"); }, 1800);
      }

      // ------------------------------------------------------------------
      // SCREEN 1 — PROJECTS OVERVIEW
      // ------------------------------------------------------------------
      function renderOverview() {
        const app = $("#app");
        const list = showEmpty ? [] : projects;

        let cards;
        if (list.length === 0) {
          cards = '<div class="empty">No projects yet — create one to register repos and launch initiatives.</div>';
        } else {
          cards = '<div class="grid dirs">' + list.map(function (p) {
            const roll = initiativeRollup(p);
            const pill = ceoPill(p);
            const repoChips = p.repos.map(function (r) {
              return '<span class="kind-badge kind-repo" title="' + esc(r.dir) + '">' + esc(r.name) + '</span>';
            }).join("");
            return (
              '<div class="card clickable" role="button" tabindex="0" data-open="' + esc(p.id) + '">' +
                '<div class="pc-head">' +
                  '<div class="title">' + esc(projectTitle(p)) + '</div>' +
                  '<span class="chip subtle" title="node status (cosmetic — see CEO pill for the real signal)">' + esc(p.status) + '</span>' +
                '</div>' +
                '<div class="path">' + esc(p.workspace_id) + '</div>' +
                '<div class="pc-repos">' + (repoChips || '<span class="muted" style="font-size:12px">no repos yet</span>') + '</div>' +
                '<div class="swim-prog" title="initiatives fully merged across their repos">' +
                  '<span class="swim-track"><i style="width:' + roll.pct + '%"></i></span>' +
                  '<span>' + roll.done + '/' + roll.total + ' initiatives done</span>' +
                '</div>' +
                '<div class="pc-foot">' +
                  '<span class="chip ' + pill.cls + '">' + esc(pill.label) + '</span>' +
                '</div>' +
              '</div>'
            );
          }).join("") + '</div>';
        }

        app.innerHTML =
          '<div class="page-head">' +
            '<div class="ph-text">' +
              '<h1>Projects</h1>' +
              '<div class="sub">Cross-repo initiatives coordinated by a project CEO agent. ' +
                (list.length ? (list.length + ' project' + (list.length === 1 ? '' : 's') + '.') : '') + '</div>' +
            '</div>' +
            '<div class="row">' +
              '<button class="btn ghost xs" id="toggleEmpty">' + (showEmpty ? 'Show sample data' : 'Preview empty-state') + '</button>' +
              '<button class="btn" id="newProject">+ New project</button>' +
            '</div>' +
          '</div>' +
          cards;

        $("#newProject").addEventListener("click", openNewProjectModal);
        $("#toggleEmpty").addEventListener("click", function () { showEmpty = !showEmpty; render(); });
        Array.prototype.forEach.call(app.querySelectorAll("[data-open]"), function (c) {
          c.addEventListener("click", function () { goDetail(c.getAttribute("data-open")); });
          c.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goDetail(c.getAttribute("data-open")); }
          });
        });
      }

      // A compact title derived from the brief (a project node has no short-title field).
      function projectTitle(p) {
        const t = String(p.brief || "").split(/[—\-:.]/)[0].trim();
        return t.length > 60 ? t.slice(0, 57) + "…" : (t || "Untitled project");
      }

      // ------------------------------------------------------------------
      // SCREEN 2 — PROJECT DETAIL
      // ------------------------------------------------------------------
      function renderDetail() {
        const app = $("#app");
        const p = projectById(view.projectId);
        if (!p) { goOverview(); return; }
        const pill = ceoPill(p);

        app.innerHTML =
          '<button class="back-link" id="back">← All projects</button>' +
          '<div class="page-head">' +
            '<div class="ph-text">' +
              '<h1>' + esc(projectTitle(p)) + '</h1>' +
              '<div class="path">' + esc(p.workspace_id) + '</div>' +
              '<div class="sub">' + esc(p.brief) + '</div>' +
            '</div>' +
            '<span class="chip subtle" title="node status (cosmetic)">' + esc(p.status) + '</span>' +
          '</div>' +
          ceoCardHtml(p, pill) +
          reposPanelHtml(p) +
          initiativesPanelHtml(p);

        $("#back").addEventListener("click", goOverview);
        wireCeoCard(p);
        wireReposPanel(p);
        wireInitiativesPanel(p);
      }

      function ceoCardHtml(p, pill) {
        const enabled = CEO_GATE_ON && p.ceo_enabled === 1;
        const lifeCls = enabled && p.leaderAlive ? "alive" : "down";
        const lifeTxt = enabled
          ? (p.leaderAlive ? "CEO agent alive · " + esc(p.leaderAgo) : "CEO agent down · " + esc(p.leaderAgo))
          : "CEO agent inactive";
        const gateNote = !CEO_GATE_ON
          ? '<div class="ceo-note">CEO agent globally disabled (<code>BUTCHR_CEO_AGENT</code> unset) — set the gate to activate any project CEO. This project’s toggle is saved but inert until then.</div>'
          : "";
        return (
          '<div class="panel ceo-card">' +
            '<div class="panel-head"><h2>CEO agent</h2><span class="spacer"></span>' +
              '<span class="chip ' + pill.cls + '">' + esc(pill.label) + '</span>' +
            '</div>' +
            '<div class="ceo-row">' +
              '<label class="switch"><input type="checkbox" id="ceoToggle"' + (p.ceo_enabled === 1 ? " checked" : "") +
                (CEO_GATE_ON ? "" : " disabled") + ' /><span class="track"></span>' +
                '<span>' + (p.ceo_enabled === 1 ? "Enabled" : "Disabled") + '</span></label>' +
              '<span class="ceo-life"><span class="ceo-dot ' + lifeCls + '"></span>' + lifeTxt + '</span>' +
            '</div>' +
            gateNote +
          '</div>'
        );
      }

      function wireCeoCard(p) {
        const cb = $("#ceoToggle");
        if (!cb) return;
        cb.addEventListener("change", function () {
          // PATCH /api/projects/:id { ceo_enabled }
          p.ceo_enabled = cb.checked ? 1 : 0;
          if (p.ceo_enabled === 1 && p.leaderAlive === false && p.leaderAgo === "disabled") {
            p.leaderAlive = true; p.leaderAgo = "just now";
          }
          toast(cb.checked ? "CEO enabled" : "CEO disabled");
          render();
        });
      }

      function reposPanelHtml(p) {
        const rows = p.repos.length
          ? p.repos.map(function (r) {
              return (
                '<div class="repo-row">' +
                  '<span class="ic">◆</span>' +
                  '<span class="nm">' + esc(r.name) + '</span>' +
                  '<span class="rp">' + esc(r.dir) + '</span>' +
                  '<span class="spacer"></span>' +
                  '<button class="icon-btn" title="Unregister repo" aria-label="Unregister ' + esc(r.name) + '" data-unreg="' + esc(r.repoId) + '">×</button>' +
                '</div>'
              );
            }).join("")
          : '<div class="empty">No repos registered — add one to target it with an initiative.</div>';
        return (
          '<div class="panel">' +
            '<div class="panel-head"><h2>Repos</h2><span class="spacer"></span>' +
              '<button class="btn ghost xs" id="addRepo">+ Add repo</button>' +
            '</div>' +
            rows +
          '</div>'
        );
      }

      function wireReposPanel(p) {
        const add = $("#addRepo");
        if (add) add.addEventListener("click", function () { openAddRepoModal(p); });
        Array.prototype.forEach.call(document.querySelectorAll("[data-unreg]"), function (b) {
          b.addEventListener("click", function () {
            // DELETE /api/projects/:id/repos/:repoId
            const rid = b.getAttribute("data-unreg");
            p.repos = p.repos.filter(function (r) { return r.repoId !== rid; });
            toast("repo unregistered");
            render();
          });
        });
      }

      function initiativesPanelHtml(p) {
        const inits = p.initiatives.length
          ? p.initiatives.map(function (init) {
              const roll = storyRollup(init);
              const targets = init.targets.map(function (t) {
                return (
                  '<span class="init-target"><span class="tr">' + esc(t.repo) + '</span>' +
                    '<span class="chip ' + esc(t.story.status) + '">' + esc(t.story.status.replace(/_/g, " ")) + '</span></span>'
                );
              }).join("");
              return (
                '<div class="init">' +
                  '<div class="ib">' + esc(init.brief) + '</div>' +
                  '<div class="init-targets">' + targets + '</div>' +
                  '<div class="rollup-summary"><span class="rollup-frac">' + roll.done + '/' + roll.total + '</span>' +
                    '<span class="muted">stories merged</span></div>' +
                  '<div class="rollup-bar"><div class="rollup-bar-fill" style="width:' + roll.pct + '%"></div></div>' +
                '</div>'
              );
            }).join("")
          : '<div class="empty">No initiatives yet — launch one against a single repo or fan out across several.</div>';
        return (
          '<div class="panel">' +
            '<div class="panel-head"><h2>Initiatives</h2><span class="spacer"></span>' +
              '<button class="btn" id="launchInit">Launch initiative</button>' +
            '</div>' +
            inits +
          '</div>'
        );
      }

      function wireInitiativesPanel(p) {
        const b = $("#launchInit");
        if (b) b.addEventListener("click", function () { openLaunchModal(p); });
      }

      // ------------------------------------------------------------------
      // MODALS (verbatim .modal pattern)
      // ------------------------------------------------------------------
      function openModal(opts) {
        const backdrop = document.createElement("div");
        backdrop.className = "modal-backdrop";
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.setAttribute("role", "dialog");
        modal.setAttribute("aria-modal", "true");
        modal.innerHTML =
          '<div class="m-head"><h3>' + esc(opts.title) + '</h3>' +
            '<button class="x-close" aria-label="Close">×</button></div>';
        modal.appendChild(opts.body);
        modal.appendChild(opts.footer);
        backdrop.appendChild(modal);
        document.body.appendChild(backdrop);

        function close() { if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop); document.removeEventListener("keydown", onKey); }
        function onKey(e) { if (e.key === "Escape") close(); }
        document.addEventListener("keydown", onKey);
        $(".x-close", modal).addEventListener("click", close);
        backdrop.addEventListener("click", function (e) { if (e.target === backdrop) close(); });
        return { backdrop: backdrop, modal: modal, close: close };
      }

      function footer(children) {
        const f = document.createElement("div");
        f.className = "m-foot";
        children.forEach(function (c) { f.appendChild(c); });
        return f;
      }
      function btn(cls, label) { const b = document.createElement("button"); b.className = cls; b.textContent = label; return b; }

      // dir picker <select> options
      function dirOptions(selected) {
        return KNOWN_DIRS.map(function (d) {
          return '<option value="' + esc(d) + '"' + (d === selected ? " selected" : "") + '>' + esc(d) + '</option>';
        }).join("");
      }

      // CREATE-PROJECT modal (POST /api/projects)
      function openNewProjectModal() {
        const body = document.createElement("div");
        body.className = "m-body";
        body.innerHTML =
          '<label class="field"><span class="lbl">anchor workspace — the project’s home directory</span>' +
            '<select id="np-anchor">' + dirOptions(KNOWN_DIRS[0]) + '</select></label>' +
          '<label class="field" style="margin-bottom:6px"><span class="lbl">brief — what this project should deliver across its repos</span>' +
            '<textarea id="np-brief" placeholder="Describe the project in a sentence or two…"></textarea></label>' +
          '<small class="hint muted">A project registers repos and coordinates cross-repo initiatives via a CEO agent.</small>';
        const err = document.createElement("span"); err.className = "m-error hint";
        const cancel = btn("btn ghost", "Cancel");
        const create = btn("btn", "Create project");
        const foot = footer([err, cancel, create]);
        const h = openModal({ title: "New project", body: body, footer: foot });
        cancel.addEventListener("click", h.close);
        $("#np-brief", body).focus();

        create.addEventListener("click", function () {
          const brief = $("#np-brief", body).value.trim();
          const anchor = $("#np-anchor", body).value;
          if (!brief) { err.textContent = "Describe the project first."; err.classList.add("on"); return; }
          // POST /api/projects — new project lands 'merged' (how createProject inserts it).
          projects.unshift({
            id: mkId("pr"), brief: brief, ceo_enabled: null, workspace_id: anchor, status: "merged",
            leaderAlive: false, leaderAgo: "never started",
            repos: [{ repoId: mkId("rp"), name: anchor.split("/").pop(), dir: anchor }],
            initiatives: [],
          });
          showEmpty = false;
          h.close(); toast("project created"); render();
        });
      }

      // ADD-REPO modal (POST /api/projects/:id/repos) — pick from known dirs not already registered
      function openAddRepoModal(p) {
        const taken = p.repos.map(function (r) { return r.dir; });
        const avail = KNOWN_DIRS.filter(function (d) { return taken.indexOf(d) === -1; });
        const body = document.createElement("div");
        body.className = "m-body";
        if (avail.length === 0) {
          body.innerHTML = '<div class="empty">Every known directory is already registered to this project.</div>';
        } else {
          body.innerHTML =
            '<label class="field" style="margin-bottom:6px"><span class="lbl">directory — register a repo the project can target</span>' +
              '<select id="ar-dir">' + avail.map(function (d) {
                return '<option value="' + esc(d) + '">' + esc(d) + '</option>';
              }).join("") + '</select></label>';
        }
        const cancel = btn("btn ghost", avail.length ? "Cancel" : "Close");
        const add = btn("btn", "Add repo");
        if (avail.length === 0) add.disabled = true;
        const foot = footer([document.createElement("span"), cancel, add]);
        foot.firstChild.className = "hint";
        const h = openModal({ title: "Add repo", body: body, footer: foot });
        cancel.addEventListener("click", h.close);
        add.addEventListener("click", function () {
          if (avail.length === 0) return;
          const dir = $("#ar-dir", body).value;
          p.repos.push({ repoId: mkId("rp"), name: dir.split("/").pop(), dir: dir });
          h.close(); toast("repo registered"); render();
        });
      }

      // ------------------------------------------------------------------
      // SCREEN 3 — LAUNCH-INITIATIVE modal (single-repo OR cross-repo fan-out)
      //   POST /api/projects/:id/initiatives { repo, brief } OR { targets:[{repo,brief}] }
      // ------------------------------------------------------------------
      function openLaunchModal(p) {
        let mode = "single"; // 'single' | 'fanout'
        const repoNames = p.repos.map(function (r) { return r.name; });
        const body = document.createElement("div");
        body.className = "m-body";

        function repoSelect(id, selected) {
          return '<select ' + (id ? 'id="' + id + '" ' : "") + 'class="tgt-repo">' +
            repoNames.map(function (n) {
              return '<option value="' + esc(n) + '"' + (n === selected ? " selected" : "") + '>' + esc(n) + '</option>';
            }).join("") + '</select>';
        }

        function draw() {
          if (repoNames.length === 0) {
            body.innerHTML = '<div class="empty">Register at least one repo before launching an initiative.</div>';
            create.disabled = true;
            return;
          }
          create.disabled = false;
          let inner =
            '<div class="seg" role="tablist">' +
              '<button type="button" data-mode="single" class="' + (mode === "single" ? "on" : "") + '" role="tab" aria-selected="' + (mode === "single") + '">Single repo</button>' +
              '<button type="button" data-mode="fanout" class="' + (mode === "fanout" ? "on" : "") + '" role="tab" aria-selected="' + (mode === "fanout") + '">Cross-repo fan-out</button>' +
            '</div>';
          if (mode === "single") {
            inner +=
              '<label class="field"><span class="lbl">repo</span>' + repoSelect("li-repo") + '</label>' +
              '<label class="field" style="margin-bottom:2px"><span class="lbl">brief — what to build in this repo</span>' +
                '<textarea class="tgt-brief" placeholder="Describe the initiative for this repo…"></textarea></label>';
          } else {
            inner +=
              '<span class="lbl">targets — one {repo, brief} per repo; add as many as you need</span>' +
              '<div id="targets"></div>' +
              '<button type="button" class="btn ghost xs add-target" id="addTgt">+ Add target</button>';
          }
          body.innerHTML = inner;

          Array.prototype.forEach.call(body.querySelectorAll("[data-mode]"), function (b) {
            b.addEventListener("click", function () { mode = b.getAttribute("data-mode"); draw(); });
          });
          if (mode === "fanout") {
            const wrap = $("#targets", body);
            function addRow(sel) {
              const row = document.createElement("div");
              row.className = "target-row";
              row.innerHTML =
                repoSelect(null, sel) +
                '<textarea class="tgt-brief" placeholder="Brief for this repo…"></textarea>' +
                '<button type="button" class="icon-btn" title="Remove target" aria-label="Remove target">×</button>';
              $(".icon-btn", row).addEventListener("click", function () {
                if (wrap.children.length > 1) wrap.removeChild(row);
                else toast("keep at least one target");
              });
              wrap.appendChild(row);
            }
            addRow(repoNames[0]);
            addRow(repoNames[1] || repoNames[0]);
            $("#addTgt", body).addEventListener("click", function () { addRow(repoNames[0]); });
          }
        }

        const err = document.createElement("span"); err.className = "m-error hint";
        const cancel = btn("btn ghost", "Cancel");
        const create = btn("btn", "Launch");
        const foot = footer([err, cancel, create]);
        const h = openModal({ title: "Launch initiative", body: body, footer: foot });
        cancel.addEventListener("click", h.close);
        draw();

        create.addEventListener("click", function () {
          err.classList.remove("on"); err.textContent = "";
          let targets;
          if (mode === "single") {
            const repo = $(".tgt-repo", body).value;
            const brief = $(".tgt-brief", body).value.trim();
            if (!brief) { err.textContent = "Write a brief first."; err.classList.add("on"); return; }
            targets = [{ repo: repo, brief: brief }]; // POST { repo, brief }
          } else {
            const rows = Array.prototype.slice.call(body.querySelectorAll(".target-row"));
            targets = [];
            for (let i = 0; i < rows.length; i++) {
              const repo = $(".tgt-repo", rows[i]).value;
              const brief = $(".tgt-brief", rows[i]).value.trim();
              if (brief) targets.push({ repo: repo, brief: brief });
            }
            if (targets.length === 0) { err.textContent = "Fill in at least one target brief."; err.classList.add("on"); return; }
            // POST { targets:[{repo,brief}] }
          }
          const initBrief = targets.length === 1 ? targets[0].brief : (targets.length + "-repo initiative");
          p.initiatives.push({
            iid: mkId("in"), brief: initBrief,
            targets: targets.map(function (t) {
              return { repo: t.repo, story: { id: mkId("st"), status: "in_progress" } };
            }),
          });
          h.close();
          toast(targets.length === 1 ? "initiative launched" : targets.length + " stories fanned out");
          render();
        });
      }

      // ------------------------------------------------------------------
      // theme toggle + boot
      // ------------------------------------------------------------------
      function syncThemeButton() {
        const dark = document.documentElement.dataset.theme === "dark";
        $("#themeIcon").textContent = dark ? "☀" : "☾";
        $("#themeLabel").textContent = dark ? "Light" : "Dark";
      }
      $("#themeToggle").addEventListener("click", function () {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        try { localStorage.setItem("butchr-theme", next); } catch (e) { /* ignore */ }
        syncThemeButton();
      });
      // Mockup-only control: flip the simulated global BUTCHR_CEO_AGENT gate so reviewers
      // can see both the active state and the honest "gate OFF" note on the CEO card.
      $("#gateToggle").addEventListener("click", function () {
        CEO_GATE_ON = !CEO_GATE_ON;
        $("#gateLabel").textContent = "Gate: " + (CEO_GATE_ON ? "on" : "off");
        render();
      });

      function render() {
        if (view.name === "detail") renderDetail();
        else renderOverview();
      }

      syncThemeButton();
      render();
    </script>
  </body>
</html>
